name: release-package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.1); 留空则使用触发 ref 的标签名去掉 v 前缀"
        required: false
        type: string

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build package zip
        shell: pwsh
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          $fromInput = $env:INPUT_VERSION
          if ($fromInput -and $fromInput.Trim() -ne "") {
            $version = $fromInput.Trim()
          } else {
            # workflow_dispatch 且 version 留空：只能从 tag 解析版本；分支 ref 会得到错误包名，须显式失败
            if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch") {
              if (-not $env:GITHUB_REF.StartsWith("refs/tags/")) {
                Write-Host "::error title=无效的触发 ref::workflow_dispatch 且未填写 version 时，必须在「Use workflow from」选择 tag（refs/tags/...），不能使用分支。当前 GITHUB_REF=$($env:GITHUB_REF)。请改用 tag，或在 version 输入框填写版本号（如 0.2.1）。"
                exit 1
              }
            }
            $ref = $env:REF_NAME
            if ($ref.StartsWith("v")) {
              $version = $ref.Substring(1)
            } else {
              $version = $ref
            }
          }
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            Write-Host "::error title=无效版本号::解析后的版本 '$version' 不符合四段式格式 ^\d+\.\d+\.\d+\.\d+$。请使用如 0.2.4.3。"
            exit 1
          }
          $outDir = "dist"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $zip = Join-Path $outDir ("pointer-gpf-mcp-" + $version + ".zip")
          $stageDir = Join-Path $outDir "package-root"
          if (Test-Path -LiteralPath $stageDir) {
            Remove-Item -LiteralPath $stageDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null

          Copy-Item -LiteralPath "mcp" -Destination (Join-Path $stageDir "mcp") -Recurse -Force
          Copy-Item -LiteralPath "install" -Destination (Join-Path $stageDir "install") -Recurse -Force
          Copy-Item -LiteralPath "godot_plugin_template" -Destination (Join-Path $stageDir "godot_plugin_template") -Recurse -Force
          Copy-Item -LiteralPath "docs" -Destination (Join-Path $stageDir "docs") -Recurse -Force
          $examplesDst = Join-Path $stageDir "examples"
          New-Item -ItemType Directory -Path $examplesDst -Force | Out-Null
          & robocopy.exe "examples" $examplesDst /E /XD .godot /R:1 /W:1 /NFL /NDL /NJH /NJS /NC /NS /NP 2>&1 | Out-Null
          $rc = $LASTEXITCODE
          if ($rc -ge 8) {
            Write-Host "::error title=examples 复制失败::robocopy exit code=$rc"
            exit 1
          }
          Copy-Item -LiteralPath "README.md" -Destination (Join-Path $stageDir "README.md") -Force
          Copy-Item -LiteralPath "gtr.config.json" -Destination (Join-Path $stageDir "gtr.config.json") -Force
          Copy-Item -LiteralPath ".gitignore" -Destination (Join-Path $stageDir ".gitignore") -Force

          Compress-Archive -Path (Join-Path $stageDir "*") -DestinationPath $zip -Force
          $sha = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLowerInvariant()
          Set-Content -Path (Join-Path $outDir "sha256.txt") -Value $sha -Encoding utf8
          Write-Output "ZIP_PATH=$zip" >> $env:GITHUB_ENV
          Write-Output "SHA256=$sha" >> $env:GITHUB_ENV
          Write-Output "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: PointerGPF v${{ env.RELEASE_VERSION }}
          body_path: .github/RELEASE_NOTES_TEMPLATE.md
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/sha256.txt
