name: mcp-integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  integration:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Runtime info
        shell: pwsh
        run: |
          python "mcp/server.py" --tool get_mcp_runtime_info --args "{}"

      - name: Context init (repo scale)
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          python "mcp/server.py" --tool init_project_context --project-root "." --max-files 2500
          $sw.Stop()
          $metric = @{
            stage = "init_project_context"
            status = "ok"
            elapsed_sec = [Math]::Round($sw.Elapsed.TotalSeconds, 3)
          } | ConvertTo-Json -Compress
          Set-Content -LiteralPath "mcp_integration_init_metrics.json" -Value $metric -Encoding UTF8

      - name: Flow seed (repo scale)
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          python "mcp/server.py" --tool generate_flow_seed --project-root "." --flow-id "ci_integration_seed" --strategy "generic"
          $sw.Stop()
          $metric = @{
            stage = "generate_flow_seed"
            status = "ok"
            elapsed_sec = [Math]::Round($sw.Elapsed.TotalSeconds, 3)
          } | ConvertTo-Json -Compress
          Set-Content -LiteralPath "mcp_integration_seed_metrics.json" -Value $metric -Encoding UTF8

      - name: Artifact contract assertions
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "scripts/assert-mcp-artifacts.ps1" -ProjectRoot "." -FlowId "ci_integration_seed"

      - name: Basic test flow execution (mock bridge)
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          @'
          import json
          import subprocess
          import threading
          import time
          from pathlib import Path

          repo_root = Path(".").resolve()
          project = repo_root
          flow_id = "ci_integration_exec"

          def run_tool(name, args):
              cmd = ["python", str(repo_root / "mcp" / "server.py"), "--tool", name, "--args", json.dumps(args, ensure_ascii=False)]
              p = subprocess.run(cmd, cwd=str(repo_root), capture_output=True, text=True, check=False)
              if p.returncode != 0:
                  raise RuntimeError(f"{name} failed: {p.stdout}\n{p.stderr}")
              payload = json.loads(p.stdout)
              if not payload.get("ok"):
                  raise RuntimeError(f"{name} returned error: {p.stdout}")
              return payload["result"]

          bridge = project / "pointer_gpf" / "tmp"
          bridge.mkdir(parents=True, exist_ok=True)
          (bridge / "runtime_gate.json").write_text(
              json.dumps(
                  {
                      "runtime_mode": "play_mode",
                      "runtime_entry": "already_running_play_session",
                      "runtime_gate_passed": True,
                  },
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )
          last_seq = [None]

          def respond():
              cmd_path = bridge / "command.json"
              rsp_path = bridge / "response.json"
              for _ in range(2000):
                  if cmd_path.is_file():
                      try:
                          data = json.loads(cmd_path.read_text(encoding="utf-8"))
                      except (json.JSONDecodeError, OSError):
                          time.sleep(0.02)
                          continue
                      seq = data.get("seq")
                      if seq is None:
                          time.sleep(0.02)
                          continue
                      if seq == last_seq[0]:
                          time.sleep(0.02)
                          continue
                      last_seq[0] = int(seq)
                      rsp_path.write_text(
                          json.dumps(
                              {"ok": True, "seq": seq, "run_id": data.get("run_id"), "message": "ok"},
                              ensure_ascii=False,
                          ),
                          encoding="utf-8",
                      )
                  time.sleep(0.02)

          threading.Thread(target=respond, daemon=True).start()
          run_tool(
              "design_game_basic_test_flow",
              {"project_root": str(project), "flow_id": flow_id, "max_feature_checks": 1},
          )
          run_tool(
              "run_game_basic_test_flow",
              {
                  "project_root": str(project),
                  "flow_id": flow_id,
                  "step_timeout_ms": 8000,
                  "require_play_mode": True,
              },
          )
          '@ | Set-Content -LiteralPath "__mcp_exec_integration.py" -Encoding UTF8
          python "__mcp_exec_integration.py"
          Remove-Item -LiteralPath "__mcp_exec_integration.py" -Force
          powershell -ExecutionPolicy Bypass -File "scripts/assert-mcp-artifacts.ps1" -ProjectRoot "." -FlowId "ci_integration_exec" -ValidateExecutionPipeline
          $sw.Stop()
          $metric = @{
            stage = "run_game_basic_test_flow"
            status = "ok"
            elapsed_sec = [Math]::Round($sw.Elapsed.TotalSeconds, 3)
          } | ConvertTo-Json -Compress
          Set-Content -LiteralPath "mcp_integration_execution_metrics.json" -Value $metric -Encoding UTF8

      - name: Figma collaboration pipeline (repo scale sample)
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          @'
          import base64
          import json
          import subprocess
          from pathlib import Path

          repo_root = Path(".").resolve()
          fixture = repo_root / "pointer_gpf" / "gpf-exp" / "runtime" / "ci_integration_figma_fixture.png"
          fixture.parent.mkdir(parents=True, exist_ok=True)
          fixture.write_bytes(base64.b64decode("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO2r8lUAAAAASUVORK5CYII="))

          def run_tool(name, args):
              cmd = ["python", "mcp/server.py", "--tool", name, "--args", json.dumps(args, ensure_ascii=False)]
              p = subprocess.run(cmd, cwd=str(repo_root), capture_output=True, text=True, check=False)
              if p.returncode != 0:
                  raise RuntimeError(f"{name} failed: {p.stdout}\n{p.stderr}")
              payload = json.loads(p.stdout)
              if not payload.get("ok"):
                  raise RuntimeError(f"{name} returned error: {p.stdout}")
              return payload["result"]

          baseline = run_tool("figma_design_to_baseline", {
              "project_root": str(repo_root),
              "figma_file_key": "ci_integration_file",
              "figma_node_id": "2:1",
              "figma_screenshot_file": str(fixture),
              "figma_design_context": {"frame": {"width": 1, "height": 1}}
          })
          compare = run_tool("compare_figma_game_ui", {
              "project_root": str(repo_root),
              "figma_baseline_file": baseline["baseline_file"],
              "game_snapshot_file": str(fixture),
          })
          run_tool("annotate_ui_mismatch", {
              "project_root": str(repo_root),
              "compare_report_file": compare["report_file"],
          })
          approval = run_tool("approve_ui_fix_plan", {
              "project_root": str(repo_root),
              "compare_report_file": compare["report_file"],
              "approved": True,
              "approval_token": "integration-approved"
          })
          run_tool("suggest_ui_fix_patch", {
              "project_root": str(repo_root),
              "compare_report_file": compare["report_file"],
              "approval_file": approval["approval_file"],
          })
          '@ | Set-Content -LiteralPath "__mcp_figma_integration.py" -Encoding UTF8
          python "__mcp_figma_integration.py"
          Remove-Item -LiteralPath "__mcp_figma_integration.py" -Force
          $sw.Stop()
          $metric = @{
            stage = "figma_collaboration_pipeline"
            status = "ok"
            elapsed_sec = [Math]::Round($sw.Elapsed.TotalSeconds, 3)
          } | ConvertTo-Json -Compress
          Set-Content -LiteralPath "mcp_integration_figma_metrics.json" -Value $metric -Encoding UTF8

      - name: Build trend metrics report
        shell: pwsh
        run: |
          $init = Get-Content -LiteralPath "mcp_integration_init_metrics.json" -Raw | ConvertFrom-Json
          $seed = Get-Content -LiteralPath "mcp_integration_seed_metrics.json" -Raw | ConvertFrom-Json
          $exec = Get-Content -LiteralPath "mcp_integration_execution_metrics.json" -Raw | ConvertFrom-Json
          $figma = Get-Content -LiteralPath "mcp_integration_figma_metrics.json" -Raw | ConvertFrom-Json
          $report = @{
            workflow = "mcp-integration"
            generated_at_utc = (Get-Date).ToUniversalTime().ToString("o")
            metrics = @($init, $seed, $exec, $figma)
          } | ConvertTo-Json -Depth 5
          Set-Content -LiteralPath "mcp_integration_trend_report.json" -Value $report -Encoding UTF8

      - name: Upload integration trend report
        uses: actions/upload-artifact@v4
        with:
          name: mcp-integration-trend
          path: mcp_integration_trend_report.json
