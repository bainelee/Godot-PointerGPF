name: mcp-smoke

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP script smoke
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "install/install-mcp.ps1"

      - name: Runtime info smoke (CLI mode)
        shell: pwsh
        run: |
          python "mcp/server.py" --tool get_mcp_runtime_info --args "{}"

      - name: Stdio MCP protocol smoke
        shell: pwsh
        run: |
          @'
          import json
          import subprocess

          p = subprocess.Popen(
              ["python", "mcp/server.py"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
          )

          def read_msg():
              header = b""
              while not header.endswith(b"\r\n\r\n"):
                  b = p.stdout.read(1)
                  if not b:
                      raise RuntimeError("stdio closed unexpectedly")
                  header += b
              length = 0
              for line in header.split(b"\r\n"):
                  if line.lower().startswith(b"content-length:"):
                      length = int(line.split(b":", 1)[1].strip())
                      break
              if length <= 0:
                  raise RuntimeError("invalid content length")
              body = p.stdout.read(length)
              return json.loads(body.decode("utf-8"))

          def send_msg(payload):
              body = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              p.stdin.write(f"Content-Length: {len(body)}\r\n\r\n".encode("ascii") + body)
              p.stdin.flush()

          send_msg(
              {
                  "jsonrpc": "2.0",
                  "id": 1,
                  "method": "initialize",
                  "params": {
                      "protocolVersion": "2024-11-05",
                      "capabilities": {},
                      "clientInfo": {"name": "ci-smoke", "version": "1.0"},
                  },
              }
          )
          init_res = read_msg()
          assert init_res["result"]["serverInfo"]["name"] == "pointer-gpf-mcp"

          send_msg({"jsonrpc": "2.0", "id": 2, "method": "tools/list", "params": {}})
          list_res = read_msg()
          tool_names = {t["name"] for t in list_res["result"]["tools"]}
          assert "get_mcp_runtime_info" in tool_names
          assert "init_project_context" in tool_names

          send_msg(
              {
                  "jsonrpc": "2.0",
                  "id": 3,
                  "method": "tools/call",
                  "params": {
                      "name": "get_mcp_runtime_info",
                      "arguments": {},
                  },
              }
          )
          call_res = read_msg()
          assert "result" in call_res
          assert "structuredContent" in call_res["result"]
          assert call_res["result"]["structuredContent"]["server_name"] == "pointer-gpf-mcp"

          send_msg(
              {
                  "jsonrpc": "2.0",
                  "id": 4,
                  "method": "tools/call",
                  "params": {"name": "not_a_real_tool", "arguments": {}},
              }
          )
          bad_tool = read_msg()
          assert bad_tool["error"]["code"] == -32000
          assert "unsupported tool" in bad_tool["error"]["message"].lower()

          send_msg(
              {
                  "jsonrpc": "2.0",
                  "id": 5,
                  "method": "tools/call",
                  "params": {"name": "get_mcp_runtime_info", "arguments": []},
              }
          )
          bad_args = read_msg()
          assert bad_args["error"]["code"] == -32000
          assert "tool arguments must be an object" in bad_args["error"]["message"].lower()

          p.terminate()
          p.wait(timeout=5)
          '@ | Set-Content -LiteralPath "__mcp_stdio_smoke.py" -Encoding UTF8
          python "__mcp_stdio_smoke.py"
          Remove-Item -LiteralPath "__mcp_stdio_smoke.py" -Force

      - name: Context init smoke (minimal sample)
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          $project = "examples/godot_minimal"
          python "mcp/server.py" --tool init_project_context --project-root $project --max-files 120
          python "mcp/server.py" --tool generate_flow_seed --project-root $project --flow-id "ci_smoke_seed" --strategy "generic"
          powershell -ExecutionPolicy Bypass -File "scripts/assert-mcp-artifacts.ps1" -ProjectRoot $project -FlowId "ci_smoke_seed"
          $sw.Stop()
          if ($sw.Elapsed.TotalSeconds -gt 90) {
            throw "Smoke execution exceeded 90s. Actual=$($sw.Elapsed.TotalSeconds)s"
          }
