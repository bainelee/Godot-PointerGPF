name: mcp-smoke

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"

concurrency:
  group: mcp-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      GPF_AUTO_REPAIR_DEFAULT: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP script smoke
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "install/install-mcp.ps1"

      - name: Update script smoke (local package mode)
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File "install/update-mcp.ps1" -PackageDir "." -FailOnVersionMismatch

      - name: Runtime info smoke (CLI mode)
        shell: pwsh
        run: |
          python "mcp/server.py" --tool get_mcp_runtime_info --args "{}"

      - name: Python contract tests (NL + flow + bugfix loop)
        shell: pwsh
        run: |
          python -m unittest tests.test_natural_language_basic_flow_commands tests.test_flow_execution_runtime tests.test_flow_engine_diagnostics tests.test_mcp_hard_teardown tests.test_repair_backend tests.test_bug_auto_fix_loop tests.test_basic_flow_dual_conclusions tests.test_nl_intent_router_expanded tests.test_bug_fix_strategies_extra tests.test_mcp_transport_protocol tests.test_failure_taxonomy tests.test_remediation_r001_trace tests.test_bug_fix_loop_trace tests.test_remediation_handlers tests.test_adapter_contract_remediation tests.test_agent_session_auto_repair_defaults -v

      - name: Stdio MCP protocol smoke
        shell: pwsh
        run: |
          @'
          import json
          import subprocess
          import sys

          p = subprocess.Popen(
              [sys.executable, "mcp/server.py"],
              stdin=subprocess.PIPE,
              stdout=subprocess.PIPE,
          )

          def read_msg():
              header = b""
              while not header.endswith(b"\r\n\r\n"):
                  b = p.stdout.read(1)
                  if not b:
                      raise RuntimeError("stdio closed unexpectedly")
                  header += b
              length = 0
              for line in header.split(b"\r\n"):
                  if line.lower().startswith(b"content-length:"):
                      length = int(line.split(b":", 1)[1].strip())
                      break
              if length <= 0:
                  raise RuntimeError("invalid content length")
              body = p.stdout.read(length)
              return json.loads(body.decode("utf-8"))

          def send_msg(payload):
              body = json.dumps(payload, ensure_ascii=False).encode("utf-8")
              p.stdin.write(f"Content-Length: {len(body)}\r\n\r\n".encode("ascii") + body)
              p.stdin.flush()

          send_msg(
              {
                  "jsonrpc": "2.0",
                  "id": 1,
                  "method": "initialize",
                  "params": {
                      "protocolVersion": "2024-11-05",
                      "capabilities": {},
                      "clientInfo": {"name": "ci-smoke", "version": "1.0"},
                  },
              }
          )
          init_res = read_msg()
          assert init_res["result"]["serverInfo"]["name"] == "pointer-gpf-mcp"

          send_msg({"jsonrpc": "2.0", "id": 2, "method": "tools/list", "params": {}})
          list_res = read_msg()
          tool_names = {t["name"] for t in list_res["result"]["tools"]}
          assert "get_mcp_runtime_info" in tool_names
          assert "init_project_context" in tool_names
          assert "figma_design_to_baseline" in tool_names
          assert "compare_figma_game_ui" in tool_names
          assert "approve_ui_fix_plan" in tool_names
          assert "design_game_basic_test_flow" in tool_names
          assert "get_basic_test_flow_reference_guide" in tool_names
          assert "run_game_basic_test_flow" in tool_names

          send_msg(
              {
                  "jsonrpc": "2.0",
                  "id": 3,
                  "method": "tools/call",
                  "params": {
                      "name": "get_mcp_runtime_info",
                      "arguments": {},
                  },
              }
          )
          call_res = read_msg()
          assert "result" in call_res
          assert "structuredContent" in call_res["result"]
          assert call_res["result"]["structuredContent"]["server_name"] == "pointer-gpf-mcp"

          send_msg(
              {
                  "jsonrpc": "2.0",
                  "id": 4,
                  "method": "tools/call",
                  "params": {"name": "not_a_real_tool", "arguments": {}},
              }
          )
          bad_tool = read_msg()
          assert bad_tool["error"]["code"] == -32000
          assert "unsupported tool" in bad_tool["error"]["message"].lower()

          send_msg(
              {
                  "jsonrpc": "2.0",
                  "id": 5,
                  "method": "tools/call",
                  "params": {"name": "get_mcp_runtime_info", "arguments": []},
              }
          )
          bad_args = read_msg()
          assert bad_args["error"]["code"] == -32000
          assert "tool arguments must be an object" in bad_args["error"]["message"].lower()

          p.terminate()
          p.wait(timeout=5)
          '@ | Set-Content -LiteralPath "__mcp_stdio_smoke.py" -Encoding UTF8
          python "__mcp_stdio_smoke.py"
          Remove-Item -LiteralPath "__mcp_stdio_smoke.py" -Force

      - name: Context init smoke (minimal sample)
        shell: pwsh
        run: |
          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          $project = "examples/godot_minimal"
          python "mcp/server.py" --tool init_project_context --project-root $project --max-files 120
          python "mcp/server.py" --tool generate_flow_seed --project-root $project --flow-id "ci_smoke_seed" --strategy "generic"
          powershell -ExecutionPolicy Bypass -File "scripts/assert-mcp-artifacts.ps1" -ProjectRoot $project -FlowId "ci_smoke_seed"
          $sw.Stop()
          if ($sw.Elapsed.TotalSeconds -gt 90) {
            throw "Smoke execution exceeded 90s. Actual=$($sw.Elapsed.TotalSeconds)s"
          }

      - name: Runtime execution smoke (mock bridge)
        shell: pwsh
        run: |
          @'
          import json
          import subprocess
          import sys
          import threading
          import time
          from pathlib import Path

          repo_root = Path(".").resolve()
          project = (repo_root / "examples" / "godot_minimal").resolve()
          flow_id = "ci_smoke_execution"

          def run_tool(name, args):
              cmd = [sys.executable, str(repo_root / "mcp" / "server.py"), "--tool", name, "--args", json.dumps(args, ensure_ascii=False)]
              p = subprocess.run(cmd, cwd=str(repo_root), capture_output=True, text=True, check=False)
              if p.returncode != 0:
                  raise RuntimeError(f"{name} failed: {p.stdout}\n{p.stderr}")
              payload = json.loads(p.stdout)
              if not payload.get("ok"):
                  raise RuntimeError(f"{name} returned error: {p.stdout}")
              return payload["result"]

          bridge = project / "pointer_gpf" / "tmp"
          bridge.mkdir(parents=True, exist_ok=True)
          (bridge / "runtime_gate.json").write_text(
              json.dumps(
                  {
                      "runtime_mode": "play_mode",
                      "runtime_entry": "already_running_play_session",
                      "runtime_gate_passed": True,
                  },
                  ensure_ascii=False,
              ),
              encoding="utf-8",
          )
          last_seq = [None]

          def respond():
              cmd_path = bridge / "command.json"
              rsp_path = bridge / "response.json"
              for _ in range(2000):
                  if cmd_path.is_file():
                      try:
                          data = json.loads(cmd_path.read_text(encoding="utf-8"))
                      except (json.JSONDecodeError, OSError):
                          time.sleep(0.02)
                          continue
                      seq = data.get("seq")
                      if seq is None:
                          time.sleep(0.02)
                          continue
                      if seq == last_seq[0]:
                          time.sleep(0.02)
                          continue
                      last_seq[0] = int(seq)
                      rsp_path.write_text(
                          json.dumps(
                              {"ok": True, "seq": seq, "run_id": data.get("run_id"), "message": "ok"},
                              ensure_ascii=False,
                          ),
                          encoding="utf-8",
                      )
                  time.sleep(0.02)

          threading.Thread(target=respond, daemon=True).start()
          run_tool(
              "design_game_basic_test_flow",
              {"project_root": str(project), "flow_id": flow_id, "max_feature_checks": 1},
          )
          run_tool(
              "run_game_basic_test_flow",
              {
                  "project_root": str(project),
                  "flow_id": flow_id,
                  "step_timeout_ms": 8000,
                  "require_play_mode": True,
              },
          )
          '@ | Set-Content -LiteralPath "__mcp_exec_smoke.py" -Encoding UTF8
          python "__mcp_exec_smoke.py"
          Remove-Item -LiteralPath "__mcp_exec_smoke.py" -Force
          powershell -ExecutionPolicy Bypass -File "scripts/assert-mcp-artifacts.ps1" -ProjectRoot "examples/godot_minimal" -FlowId "ci_smoke_execution" -ValidateExecutionPipeline

      - name: Figma collaboration smoke (minimal sample)
        shell: pwsh
        run: |
          @'
          import base64
          import json
          import subprocess
          import sys
          from pathlib import Path

          repo_root = Path(".").resolve()
          project = (repo_root / "examples" / "godot_minimal").resolve()
          fixture = project / "pointer_gpf" / "gpf-exp" / "runtime" / "ci_figma_fixture.png"
          fixture.parent.mkdir(parents=True, exist_ok=True)
          fixture.write_bytes(base64.b64decode("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO2r8lUAAAAASUVORK5CYII="))

          def run_tool(name, args):
              cmd = [sys.executable, "mcp/server.py", "--tool", name, "--args", json.dumps(args, ensure_ascii=False)]
              p = subprocess.run(cmd, cwd=str(repo_root), capture_output=True, text=True, check=False)
              if p.returncode != 0:
                  raise RuntimeError(f"{name} failed: {p.stdout}\n{p.stderr}")
              payload = json.loads(p.stdout)
              if not payload.get("ok"):
                  raise RuntimeError(f"{name} returned error: {p.stdout}")
              return payload["result"]

          baseline = run_tool("figma_design_to_baseline", {
              "project_root": str(project),
              "figma_file_key": "ci_file",
              "figma_node_id": "1:1",
              "figma_screenshot_file": str(fixture),
              "figma_design_context": {"frame": {"width": 1, "height": 1}}
          })
          compare = run_tool("compare_figma_game_ui", {
              "project_root": str(project),
              "figma_baseline_file": baseline["baseline_file"],
              "game_snapshot_file": str(fixture),
          })
          run_tool("annotate_ui_mismatch", {
              "project_root": str(project),
              "compare_report_file": compare["report_file"],
          })
          approval = run_tool("approve_ui_fix_plan", {
              "project_root": str(project),
              "compare_report_file": compare["report_file"],
              "approved": True,
              "approval_token": "ci-approved"
          })
          run_tool("suggest_ui_fix_patch", {
              "project_root": str(project),
              "compare_report_file": compare["report_file"],
              "approval_file": approval["approval_file"],
          })
          '@ | Set-Content -LiteralPath "__mcp_figma_smoke.py" -Encoding UTF8
          python "__mcp_figma_smoke.py"
          Remove-Item -LiteralPath "__mcp_figma_smoke.py" -Force

      - name: Legacy gameplayflow CLI (run_game_flow / start_stepwise_flow / pull_cursor_chat_plugin)
        shell: pwsh
        env:
          MCP_ALLOW_NON_BROADCAST: "1"
        run: |
          @'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          repo = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          proj = repo / "examples" / "godot_minimal"
          flow = repo / "flows" / "internal" / "contract_force_fail_invalid_scene.json"

          def call(tool: str, args: dict) -> subprocess.CompletedProcess[str]:
              return subprocess.run(
                  [
                      sys.executable,
                      str(repo / "mcp" / "server.py"),
                      "--tool",
                      tool,
                      "--args",
                      json.dumps(args, ensure_ascii=False),
                  ],
                  cwd=str(repo),
                  capture_output=True,
                  text=True,
                  check=False,
              )

          r0 = call(
              "run_game_flow",
              {
                  "project_root": str(proj),
                  "flow_file": str(flow),
                  "dry_run": True,
                  "allow_non_broadcast": True,
              },
          )
          print(r0.stdout)
          if r0.returncode != 0:
              print(r0.stderr)
              sys.exit(1)

          r1 = call(
              "start_stepwise_flow",
              {
                  "project_root": str(proj),
                  "flow_file": str(flow),
                  "allow_non_broadcast": True,
              },
          )
          print("start_stepwise_flow rc=", r1.returncode)

          r2 = call("pull_cursor_chat_plugin", {"run_id": ""})
          print("pull_cursor_chat_plugin rc=", r2.returncode)
          sys.exit(0)
          '@ | Set-Content -LiteralPath "__legacy_gf_ci_smoke.py" -Encoding UTF8
          python "__legacy_gf_ci_smoke.py"
          Remove-Item -LiteralPath "__legacy_gf_ci_smoke.py" -Force
